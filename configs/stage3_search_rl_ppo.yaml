# MedicalSearchGPT - Search-Augmented PPO Training Configuration
# This config is for veRL-based PPO training with medical search integration
# Requires: verl-env (transformers<4.48, vllm, ray)

data:
  train_files: data/search_rl/train.parquet
  val_files: data/search_rl/test.parquet
  train_data_num: null
  val_data_num: null
  train_batch_size: 256
  val_batch_size: 128
  max_prompt_length: 4096
  max_response_length: 500
  max_start_length: 2048
  max_obs_length: 500
  shuffle_train_dataloader: true

algorithm:
  adv_estimator: ppo
  no_think_rl: false

actor_rollout_ref:
  model:
    path: Qwen/Qwen2.5-7B-Instruct  # Replace with your SFT medical model
    enable_gradient_checkpointing: true
    use_remove_padding: true
  actor:
    optim:
      lr: 1.0e-6
      lr_warmup_steps_ratio: 0.285
    use_kl_loss: true
    kl_loss_coef: 0.001
    kl_loss_type: low_var_kl
    ppo_mini_batch_size: 128
    ppo_micro_batch_size: 32
    state_masking: true
    fsdp_config:
      param_offload: true
      grad_offload: true
      optimizer_offload: true
  rollout:
    name: vllm
    log_prob_micro_batch_size: 64
    tensor_model_parallel_size: 1
    gpu_memory_utilization: 0.6
    n_agent: 1
    temperature: 1.0
  ref:
    log_prob_micro_batch_size: 64
    fsdp_config:
      param_offload: true

critic:
  model:
    path: Qwen/Qwen2.5-7B-Instruct  # Replace with your SFT medical model
    enable_gradient_checkpointing: true
    fsdp_config:
      param_offload: true
  optim:
    lr: 1.0e-5

# Medical search integration
max_turns: 3
retriever:
  url: "http://127.0.0.1:8000/retrieve"
  topk: 5

trainer:
  logger: ['wandb']
  n_gpus_per_node: 8
  nnodes: 1
  save_freq: 100
  test_freq: 50
  total_epochs: 10
  total_training_steps: 500
  project_name: MedicalSearchGPT
  experiment_name: medical-search-ppo
  default_local_dir: verl_checkpoints/medical-search-ppo
